<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yevmiye Defteri</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Space+Mono:wght@400;700&display=swap');

  :root{
    --bg-deep: #0f1115;
    --bg-panel: #171a21;
    --accent: #ffb84c;
    --accent2: #58c9ff;
    --text: #eef0f4;
    --muted: #8a8f9c;
    --danger: #ff6b6b;
    --ok: #52d68a;
    --border: rgba(255,255,255,0.08);
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(ellipse at 15% -10%, rgba(255,184,76,0.08), transparent 55%),
      radial-gradient(ellipse at 90% 0%, rgba(88,201,255,0.08), transparent 50%),
      var(--bg-deep);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding: 28px 14px 60px;
  }

  header{ text-align:center; margin-bottom:22px; }
  header h1{
    font-family:'Sora', sans-serif;
    font-weight:800;
    font-size: clamp(22px, 5vw, 30px);
    margin:0 0 6px;
    color: var(--text);
  }
  header h1 span{ color: var(--accent); }
  header p{ margin:0; color: var(--muted); font-size:13px; }

  .card{
    width:100%;
    max-width:460px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px;
    margin-bottom: 18px;
    box-shadow: 0 16px 32px -18px rgba(0,0,0,0.5);
  }

  .card h2{
    font-family:'Sora', sans-serif;
    font-size:14px;
    font-weight:700;
    color: var(--accent);
    margin:0 0 16px;
    letter-spacing:0.2px;
  }

  label{ display:block; font-size:11px; color: var(--muted); margin: 10px 0 6px; }

  input, select{
    width:100%;
    padding:11px 12px;
    border-radius:8px;
    border:1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.03);
    color: var(--text);
    font-family:'Space Mono', monospace;
    font-size:14px;
    outline:none;
  }
  input:focus, select:focus{ border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(88,201,255,0.15); }

  .row{ display:flex; gap:10px; }
  .row > *{ flex:1; }

  button{
    cursor:pointer;
    border:none;
    border-radius:8px;
    font-family:'Sora', sans-serif;
    font-weight:700;
    font-size:13px;
    padding:12px 16px;
    margin-top:16px;
    width:100%;
  }
  .btn-primary{ background: linear-gradient(90deg, var(--accent), #ffa022); color:#2a1a03; }
  .btn-secondary{ background: transparent; color: var(--muted); border: 1px solid rgba(255,255,255,0.14); font-weight:600; font-size:12px; padding:9px 12px; }
  .btn-secondary:hover{ color: var(--text); border-color: var(--accent2); }
  .btn-danger{ background: rgba(255,107,107,0.12); color: var(--danger); border: 1px solid rgba(255,107,107,0.4); font-size:12px; padding:8px 12px; width:auto; margin:0; }
  .link-btn{ background:none; border:none; color: var(--accent2); font-size:11px; text-decoration: underline; width:auto; padding:0; margin: 10px 0 0; cursor:pointer; }

  .msg{ margin-top:12px; font-size:12px; padding:10px 12px; border-radius:8px; display:none; line-height:1.5; }
  .msg.show{ display:block; }
  .msg.ok{ background: rgba(82,214,138,0.1); color: var(--ok); border:1px solid rgba(82,214,138,0.3); }
  .msg.err{ background: rgba(255,107,107,0.1); color: var(--danger); border:1px solid rgba(255,107,107,0.3); }

  .user-bar{ display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
  .user-bar .who{ font-size:13px; }
  .user-bar .who span{ color: var(--accent); }

  .hidden{ display:none !important; }

  .summary-grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:12px;
    margin-top: 4px;
  }
  .summary-box{
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    text-align:center;
  }
  .summary-box .val{ font-family:'Sora', sans-serif; font-weight:800; font-size:20px; }
  .summary-box .lbl{ font-size:10px; color: var(--muted); margin-top:4px; text-transform:uppercase; letter-spacing:0.5px; }
  .summary-box.net .val{ color: var(--accent); }
  .summary-box.earn .val{ color: var(--ok); }
  .summary-box.adv .val{ color: var(--danger); }

  table{ width:100%; border-collapse: collapse; margin-top:10px; }
  th, td{ text-align:left; padding:9px 6px; font-size:12px; border-bottom: 1px solid var(--border); }
  th{ color: var(--muted); font-size:10px; text-transform: uppercase; letter-spacing:0.4px; }
  td.num{ text-align:right; }
  td.adv{ color: var(--danger); }
  .del-btn{
    background:none; border:none; color: var(--muted); cursor:pointer; font-size:14px; width:auto; padding:2px 6px; margin:0;
  }
  .del-btn:hover{ color: var(--danger); }

  .empty{ color: var(--muted); font-size:12px; text-align:center; padding: 14px 0; }

  footer{ color: var(--muted); font-size:11px; margin-top: 6px; text-align:center; }
</style>
</head>
<body>

<header>
  <h1>YEVMİYE <span>DEFTERİ</span></h1>
  <p>Çalışma günleri, mesai ve avans takibi</p>
</header>

<!-- AUTH CARD -->
<div class="card" id="authCard">
  <div id="loginForm">
    <h2>Giriş Yap</h2>
    <label for="loginEmail">E-posta</label>
    <input id="loginEmail" type="email" placeholder="ornek@eposta.com" autocomplete="email">
    <label for="loginPass">Şifre</label>
    <input id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password">
    <button class="btn-primary" onclick="doLogin()">Giriş Yap</button>
    <button class="link-btn" onclick="showForgot()">Şifremi unuttum</button>
    <div id="loginMsg" class="msg"></div>
    <hr style="border-color: var(--border); margin:18px 0;">
    <button class="btn-secondary" onclick="showRegister()">Hesabın yok mu? Kayıt ol</button>
  </div>

  <div id="registerForm" class="hidden">
    <h2>Kayıt Ol</h2>
    <label for="regName">Adın</label>
    <input id="regName" type="text" placeholder="Adın Soyadın">
    <label for="regEmail">E-posta</label>
    <input id="regEmail" type="email" placeholder="ornek@eposta.com" autocomplete="email">
    <label for="regPass">Şifre</label>
    <input id="regPass" type="password" placeholder="En az 6 karakter" autocomplete="new-password">
    <button class="btn-primary" onclick="doRegister()">Kayıt Ol</button>
    <div id="registerMsg" class="msg"></div>
    <button class="btn-secondary" onclick="showLogin()">Zaten hesabın var mı? Giriş yap</button>
  </div>

  <div id="forgotForm" class="hidden">
    <h2>Şifremi Unuttum</h2>
    <label for="forgotEmail">Kayıtlı e-posta adresin</label>
    <input id="forgotEmail" type="email" placeholder="ornek@eposta.com">
    <button class="btn-primary" onclick="doForgot()">Sıfırlama bağlantısı gönder</button>
    <div id="forgotMsg" class="msg"></div>
    <button class="btn-secondary" onclick="showLogin()">Girişe dön</button>
  </div>
</div>

<!-- APP AREA (logged in) -->
<div id="appArea" class="hidden" style="width:100%; display:flex; flex-direction:column; align-items:center;">

  <div class="card">
    <div class="user-bar">
      <div class="who">Merhaba, <span id="whoName"></span></div>
      <button class="btn-danger" onclick="doLogout()">Çıkış yap</button>
    </div>
  </div>

  <!-- Settings -->
  <div class="card">
    <h2>Ücret Ayarları</h2>
    <div class="row">
      <div>
        <label for="dailyWage">Günlük yevmiye (₺)</label>
        <input id="dailyWage" type="number" placeholder="örn. 1000">
      </div>
      <div>
        <label for="overtimeRate">Mesai saat ücreti (₺)</label>
        <input id="overtimeRate" type="number" placeholder="örn. 100">
      </div>
    </div>
    <button class="btn-primary" onclick="saveSettings()">Ayarları Kaydet</button>
    <div id="settingsMsg" class="msg"></div>
  </div>

  <!-- Add entry -->
  <div class="card">
    <h2>Yeni Kayıt Ekle</h2>
    <label for="entryDate">Tarih</label>
    <input id="entryDate" type="date">
    <label for="entryType">Çalışma durumu</label>
    <select id="entryType">
      <option value="1">Tam gün çalıştım</option>
      <option value="0.5">Yarım gün çalıştım</option>
      <option value="0">Çalışmadım (izin/tatil)</option>
    </select>
    <label for="entryOvertime">Mesai saati (varsa)</label>
    <input id="entryOvertime" type="number" placeholder="örn. 2" value="0">
    <label for="entryAdvance">Aldığın avans (varsa, ₺)</label>
    <input id="entryAdvance" type="number" placeholder="örn. 500" value="0">
    <label for="entryNote">Not (isteğe bağlı)</label>
    <input id="entryNote" type="text" placeholder="örn. şantiye adı, açıklama">
    <button class="btn-primary" onclick="addEntry()">Kaydet</button>
    <div id="entryMsg" class="msg"></div>
  </div>

  <!-- Summary -->
  <div class="card">
    <h2>Özet</h2>
    <div class="summary-grid">
      <div class="summary-box">
        <div class="val" id="sumDays">0</div>
        <div class="lbl">Çalışılan gün</div>
      </div>
      <div class="summary-box">
        <div class="val" id="sumOvertime">0</div>
        <div class="lbl">Mesai saati</div>
      </div>
      <div class="summary-box earn">
        <div class="val" id="sumEarned">0 ₺</div>
        <div class="lbl">Toplam hak ediş</div>
      </div>
      <div class="summary-box adv">
        <div class="val" id="sumAdvance">0 ₺</div>
        <div class="lbl">Toplam avans</div>
      </div>
    </div>
    <div class="summary-box net" style="margin-top:12px;">
      <div class="val" id="sumNet">0 ₺</div>
      <div class="lbl">Kalan alacak</div>
    </div>
  </div>

  <!-- Entries list -->
  <div class="card">
    <h2>Kayıtlar</h2>
    <div id="entriesWrap"><div class="empty">Henüz kayıt yok.</div></div>
  </div>

</div>

<footer>Yevmiye Defteri · Firebase ile çalışır</footer>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyB5pl78DRao2SmUWsMYMSZ6YbfX4rtRNdc",
    authDomain: "gamezone-e11b0.firebaseapp.com",
    databaseURL: "https://gamezone-e11b0-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "gamezone-e11b0",
    storageBucket: "gamezone-e11b0.firebasestorage.app",
    messagingSenderId: "775694460272",
    appId: "1:775694460272:web:7e5fd5691df9d8399d5bb5",
    measurementId: "G-3M7FXX8XR4"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();

  let currentUser = null;
  let settings = { dailyWage: 0, overtimeRate: 0 };
  let entries = {};

  // ---------- UI helpers ----------
  function showMsg(id, text, ok){
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'msg show ' + (ok ? 'ok' : 'err');
  }
  function clearMsg(id){
    const el = document.getElementById(id);
    el.className = 'msg';
    el.textContent = '';
  }
  function showLogin(){
    document.getElementById('loginForm').classList.remove('hidden');
    document.getElementById('registerForm').classList.add('hidden');
    document.getElementById('forgotForm').classList.add('hidden');
  }
  function showRegister(){
    document.getElementById('loginForm').classList.add('hidden');
    document.getElementById('registerForm').classList.remove('hidden');
    document.getElementById('forgotForm').classList.add('hidden');
  }
  function showForgot(){
    document.getElementById('loginForm').classList.add('hidden');
    document.getElementById('registerForm').classList.add('hidden');
    document.getElementById('forgotForm').classList.remove('hidden');
  }

  function translateError(err){
    const map = {
      'auth/email-already-in-use': 'Bu e-posta adresi zaten kayıtlı.',
      'auth/invalid-email': 'Geçersiz e-posta adresi.',
      'auth/weak-password': 'Şifre en az 6 karakter olmalı.',
      'auth/user-not-found': 'Bu e-posta ile kayıtlı kullanıcı bulunamadı.',
      'auth/wrong-password': 'Şifre hatalı.',
      'auth/invalid-credential': 'E-posta veya şifre hatalı.',
      'auth/too-many-requests': 'Çok fazla deneme yapıldı. Lütfen biraz sonra tekrar dene.'
    };
    return map[err.code] || err.message;
  }

  // ---------- Auth actions ----------
  function doRegister(){
    clearMsg('registerMsg');
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pass = document.getElementById('regPass').value;
    if(!name){ showMsg('registerMsg', 'Lütfen adını gir.', false); return; }
    if(!email || !pass){ showMsg('registerMsg', 'E-posta ve şifre gerekli.', false); return; }

    auth.createUserWithEmailAndPassword(email, pass)
      .then(cred => cred.user.updateProfile({ displayName: name }))
      .then(() => showMsg('registerMsg', 'Kayıt başarılı! Giriş yapılıyor…', true))
      .catch(err => showMsg('registerMsg', translateError(err), false));
  }

  function doLogin(){
    clearMsg('loginMsg');
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPass').value;
    if(!email || !pass){ showMsg('loginMsg', 'E-posta ve şifre gerekli.', false); return; }

    auth.signInWithEmailAndPassword(email, pass)
      .catch(err => showMsg('loginMsg', translateError(err), false));
  }

  function doForgot(){
    clearMsg('forgotMsg');
    const email = document.getElementById('forgotEmail').value.trim();
    if(!email){ showMsg('forgotMsg', 'Lütfen e-posta adresini gir.', false); return; }

    auth.sendPasswordResetEmail(email)
      .then(() => showMsg('forgotMsg', 'Sıfırlama bağlantısı e-postana gönderildi.', true))
      .catch(err => showMsg('forgotMsg', translateError(err), false));
  }

  function doLogout(){ auth.signOut(); }

  // ---------- Auth state ----------
  auth.onAuthStateChanged(user => {
    currentUser = user;
    if(user){
      document.getElementById('authCard').classList.add('hidden');
      document.getElementById('appArea').classList.remove('hidden');
      document.getElementById('whoName').textContent = user.displayName || user.email;
      document.getElementById('loginEmail').value = '';
      document.getElementById('loginPass').value = '';
      loadUserData(user.uid);
    } else {
      document.getElementById('authCard').classList.remove('hidden');
      document.getElementById('appArea').classList.add('hidden');
      showLogin();
    }
  });

  // ---------- Load / listen to user data ----------
  function loadUserData(uid){
    db.ref('users/' + uid + '/settings').on('value', snap => {
      const s = snap.val();
      if(s){
        settings = s;
        document.getElementById('dailyWage').value = s.dailyWage || '';
        document.getElementById('overtimeRate').value = s.overtimeRate || '';
      }
      renderSummary();
    });

    db.ref('users/' + uid + '/entries').on('value', snap => {
      entries = snap.val() || {};
      renderEntries();
      renderSummary();
    });
  }

  function saveSettings(){
    clearMsg('settingsMsg');
    if(!currentUser) return;
    const dailyWage = parseFloat(document.getElementById('dailyWage').value) || 0;
    const overtimeRate = parseFloat(document.getElementById('overtimeRate').value) || 0;

    db.ref('users/' + currentUser.uid + '/settings').set({ dailyWage, overtimeRate })
      .then(() => showMsg('settingsMsg', 'Ayarlar kaydedildi.', true))
      .catch(err => showMsg('settingsMsg', 'Hata: ' + err.message, false));
  }

  function addEntry(){
    clearMsg('entryMsg');
    if(!currentUser) return;
    const date = document.getElementById('entryDate').value;
    const daysWorked = parseFloat(document.getElementById('entryType').value);
    const overtimeHours = parseFloat(document.getElementById('entryOvertime').value) || 0;
    const advance = parseFloat(document.getElementById('entryAdvance').value) || 0;
    const note = document.getElementById('entryNote').value.trim();

    if(!date){ showMsg('entryMsg', 'Lütfen bir tarih seç.', false); return; }

    const newRef = db.ref('users/' + currentUser.uid + '/entries').push();
    newRef.set({ date, daysWorked, overtimeHours, advance, note, createdAt: Date.now() })
      .then(() => {
        showMsg('entryMsg', 'Kayıt eklendi.', true);
        document.getElementById('entryDate').value = '';
        document.getElementById('entryOvertime').value = '0';
        document.getElementById('entryAdvance').value = '0';
        document.getElementById('entryNote').value = '';
      })
      .catch(err => showMsg('entryMsg', 'Hata: ' + err.message, false));
  }

  function deleteEntry(key){
    if(!currentUser) return;
    if(!confirm('Bu kaydı silmek istediğine emin misin?')) return;
    db.ref('users/' + currentUser.uid + '/entries/' + key).remove();
  }

  // ---------- Render ----------
  function renderEntries(){
    const wrap = document.getElementById('entriesWrap');
    const list = Object.entries(entries)
      .map(([key, v]) => ({ key, ...v }))
      .sort((a, b) => (b.date || '').localeCompare(a.date || ''));

    if(list.length === 0){
      wrap.innerHTML = '<div class="empty">Henüz kayıt yok.</div>';
      return;
    }

    let html = '<table><thead><tr><th>Tarih</th><th>Gün</th><th>Mesai</th><th class="num">Avans</th><th></th></tr></thead><tbody>';
    list.forEach(e => {
      const dayLabel = e.daysWorked === 1 ? 'Tam' : (e.daysWorked === 0.5 ? 'Yarım' : 'İzin');
      html += `<tr>
        <td>${escapeHtml(e.date)}${e.note ? '<br><span style="color:var(--muted); font-size:10px;">' + escapeHtml(e.note) + '</span>' : ''}</td>
        <td>${dayLabel}</td>
        <td>${e.overtimeHours || 0} sa</td>
        <td class="num adv">${e.advance ? e.advance + ' ₺' : '-'}</td>
        <td><button class="del-btn" onclick="deleteEntry('${e.key}')">✕</button></td>
      </tr>`;
    });
    html += '</tbody></table>';
    wrap.innerHTML = html;
  }

  function renderSummary(){
    const list = Object.values(entries);
    const totalDays = list.reduce((sum, e) => sum + (e.daysWorked || 0), 0);
    const totalOvertime = list.reduce((sum, e) => sum + (e.overtimeHours || 0), 0);
    const totalAdvance = list.reduce((sum, e) => sum + (e.advance || 0), 0);
    const totalEarned = (totalDays * (settings.dailyWage || 0)) + (totalOvertime * (settings.overtimeRate || 0));
    const net = totalEarned - totalAdvance;

    document.getElementById('sumDays').textContent = totalDays;
    document.getElementById('sumOvertime').textContent = totalOvertime;
    document.getElementById('sumEarned').textContent = totalEarned.toLocaleString('tr-TR') + ' ₺';
    document.getElementById('sumAdvance').textContent = totalAdvance.toLocaleString('tr-TR') + ' ₺';
    document.getElementById('sumNet').textContent = net.toLocaleString('tr-TR') + ' ₺';
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }
</script>

</body>
</html>
